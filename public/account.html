<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аккаунт — LensFlow</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Montserrat', 'sans-serif'] },
                    colors: { wf: { brown: '#73503C', dark: '#161616', beige: '#E5DFD8', gray: '#F5F5F5' } }
                }
            }
        }
    </script>
</head>
<body class="bg-wf-dark min-h-screen font-sans antialiased">
    <nav class="bg-wf-dark border-b border-white/10">
        <div class="max-w-7xl mx-auto px-5 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="/dashboard.html" class="font-display font-bold text-xl tracking-wider text-white">LENSFLOW</a>
                <div class="flex items-center gap-4">
                    <a href="/dashboard.html" class="text-white/50 hover:text-white text-sm transition">← Назад</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto px-5 sm:px-6 lg:px-8 py-10">
        <div class="text-center mb-10">
            <div id="avatarContainer" class="w-24 h-24 rounded-full mx-auto mb-4 overflow-hidden border-2 border-wf-brown/50 bg-white/10">
                <img id="avatarImg" src="" alt="avatar" class="w-full h-full object-cover">
            </div>
            <h1 class="font-display text-3xl font-bold text-white uppercase tracking-tight" id="userNameDisplay">Загрузка...</h1>
            <p class="text-white/40 text-sm mt-1" id="userLoginDisplay"></p>
        </div>

        <div class="bg-white/5 border border-white/10 rounded-2xl p-8 mb-6">
            <h2 class="font-display text-lg font-semibold text-white mb-6">Настройки профиля</h2>

            <form id="accountForm" class="space-y-5">
                <div>
                    <label class="block text-sm text-white/60 mb-1">Имя</label>
                    <input type="text" id="nameInput" required
                        class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white outline-none focus:border-wf-brown transition placeholder:text-white/30">
                </div>

                <div>
                    <label class="block text-sm text-white/60 mb-1">Логин</label>
                    <input type="text" id="usernameInput" readonly disabled
                        class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white/50 outline-none cursor-not-allowed">
                </div>

                <div>
                    <label class="block text-sm text-white/60 mb-1">Пол</label>
                    <input type="text" id="genderInput" readonly disabled
                        class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white/50 outline-none cursor-not-allowed">
                </div>

                <div>
                    <label class="block text-sm text-white/60 mb-1">Аватар</label>
                    <div class="flex gap-4">
                        <label class="flex-1 flex items-center gap-3 p-4 rounded-xl border cursor-pointer transition
                            bg-white/10 border-white/20 hover:border-wf-brown has-[:checked]:border-wf-brown has-[:checked]:bg-wf-brown/20">
                            <input type="radio" name="genderAvatar" value="male" class="hidden">
                            <img src="/avatars/man.webp" class="w-10 h-10 rounded-full object-cover">
                            <span class="text-white/70 text-sm">Мужской</span>
                        </label>
                        <label class="flex-1 flex items-center gap-3 p-4 rounded-xl border cursor-pointer transition
                            bg-white/10 border-white/20 hover:border-wf-brown has-[:checked]:border-wf-brown has-[:checked]:bg-wf-brown/20">
                            <input type="radio" name="genderAvatar" value="female" class="hidden">
                            <img src="/avatars/women.webp" class="w-10 h-10 rounded-full object-cover">
                            <span class="text-white/70 text-sm">Женский</span>
                        </label>
                        <label class="flex-1 flex items-center gap-3 p-4 rounded-xl border cursor-pointer transition
                            bg-white/10 border-white/20 hover:border-wf-brown has-[:checked]:border-wf-brown has-[:checked]:bg-wf-brown/20">
                            <input type="radio" name="genderAvatar" value="" class="hidden">
                            <div class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center">
                                <i data-lucide="user" class="w-5 h-5 text-white/50"></i>
                            </div>
                            <span class="text-white/70 text-sm">Не указан</span>
                        </label>
                    </div>
                </div>

                <button type="submit" id="saveBtn"
                    class="w-full py-3.5 rounded-xl bg-wf-brown text-white font-semibold hover:bg-wf-brown/80 transition text-sm disabled:opacity-50 disabled:cursor-not-allowed">
                    Сохранить изменения
                </button>
            </form>

            <div id="successMsg" class="mt-4 text-green-400 text-sm text-center hidden"></div>
            <div id="errorMsg" class="mt-4 text-red-400 text-sm text-center hidden"></div>
        </div>

        <div class="bg-white/5 border border-white/10 rounded-2xl p-8">
            <h2 class="font-display text-lg font-semibold text-white mb-4">Статистика</h2>
            <div id="statsContainer" class="text-sm text-white/50 space-y-2">
                <p>Загрузка...</p>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        let currentUser = null;

        async function init() {
            try {
                const res = await fetch('/api/me');
                if (!res.ok) { window.location.href = '/login.html'; return; }
                const json = await res.json();
                currentUser = json.user;
                renderUser(json.user);
                loadStats();
            } catch { window.location.href = '/login.html'; }
        }

        function renderUser(user) {
            document.getElementById('userNameDisplay').textContent = user.name;
            document.getElementById('userLoginDisplay').textContent = '@' + user.username;
            document.getElementById('nameInput').value = user.name;
            document.getElementById('usernameInput').value = user.username;

            const genderMap = { male: 'Мужской', female: 'Женский', '': 'Не указан' };
            document.getElementById('genderInput').value = genderMap[user.gender] || 'Не указан';

            const avatarEl = document.getElementById('avatarImg');
            if (user.avatar) {
                avatarEl.src = '/avatars/' + user.avatar;
                avatarEl.onerror = function() { this.src = 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect fill="#73503C" width="100" height="100"/><text x="50" y="55" text-anchor="middle" fill="white" font-size="40" font-family="sans-serif" dy=".1em">' + user.name.charAt(0).toUpperCase() + '</text></svg>'); };
            } else {
                avatarEl.src = 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect fill="#73503C" width="100" height="100"/><text x="50" y="55" text-anchor="middle" fill="white" font-size="40" font-family="sans-serif" dy=".1em">' + user.name.charAt(0).toUpperCase() + '</text></svg>');
            }

            const radios = document.querySelectorAll('input[name="genderAvatar"]');
            for (const radio of radios) {
                if (radio.value === user.gender) {
                    radio.checked = true;
                }
            }
            lucide.createIcons();
        }

        async function loadStats() {
            try {
                const res = await fetch('/api/albums');
                const json = await res.json();
                const totalAlbums = json.albums.length;
                const totalPhotos = json.albums.reduce((sum, a) => sum + (a.photo_count || 0), 0);
                const totalDownloads = json.albums.reduce((sum, a) => sum + (a.total_downloads || 0), 0);
                const generated = json.albums.filter(a => a.is_generated).length;

                document.getElementById('statsContainer').innerHTML = `
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-white/10 rounded-xl p-4 text-center">
                            <p class="text-2xl font-bold text-white">${totalAlbums}</p>
                            <p class="text-xs text-white/40 mt-1">Альбомов</p>
                        </div>
                        <div class="bg-white/10 rounded-xl p-4 text-center">
                            <p class="text-2xl font-bold text-white">${totalPhotos}</p>
                            <p class="text-xs text-white/40 mt-1">Всего фото</p>
                        </div>
                        <div class="bg-white/10 rounded-xl p-4 text-center">
                            <p class="text-2xl font-bold text-white">${totalDownloads}</p>
                            <p class="text-xs text-white/40 mt-1">Скачиваний</p>
                        </div>
                        <div class="bg-white/10 rounded-xl p-4 text-center">
                            <p class="text-2xl font-bold text-white">${generated}</p>
                            <p class="text-xs text-white/40 mt-1">Активных ссылок</p>
                        </div>
                    </div>
                `;
            } catch {}
        }

        document.getElementById('accountForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            const successMsg = document.getElementById('successMsg');
            const errorMsg = document.getElementById('errorMsg');
            successMsg.classList.add('hidden');
            errorMsg.classList.add('hidden');
            btn.disabled = true;
            btn.textContent = 'Сохранение...';

            const name = document.getElementById('nameInput').value;
            const selectedGender = document.querySelector('input[name="genderAvatar"]:checked')?.value || '';

            try {
                const res = await fetch('/api/account', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });
                const json = await res.json();
                if (!res.ok) throw new Error(json.error);

                if (selectedGender !== currentUser.gender) {
                    const avatar = selectedGender === 'male' ? 'man.webp' : selectedGender === 'female' ? 'women.webp' : '';
                    await fetch('/api/account/gender', {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ gender: selectedGender, avatar })
                    });
                }

                currentUser = json.user;
                renderUser(json.user);
                successMsg.textContent = 'Профиль обновлён';
                successMsg.classList.remove('hidden');
                setTimeout(() => successMsg.classList.add('hidden'), 3000);
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.classList.remove('hidden');
            }

            btn.disabled = false;
            btn.textContent = 'Сохранить изменения';
        });

        init();
    </script>

    <button id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" class="fixed bottom-6 right-6 z-50 w-10 h-10 rounded-full bg-wf-brown/80 backdrop-blur border border-white/20 text-white flex items-center justify-center hover:bg-wf-brown transition shadow-lg opacity-0 pointer-events-none">
        <i data-lucide="chevron-up" class="w-5 h-5"></i>
    </button>

    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] bg-wf-dark/95 border border-white/20 text-white px-5 py-3 rounded-xl shadow-2xl backdrop-blur-xl transition-all duration-300 opacity-0 translate-y-4 pointer-events-none text-sm font-medium whitespace-nowrap"></div>

    <script>
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg || 'Скопировано';
            t.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
            t.classList.add('opacity-100', 'translate-y-0');
            clearTimeout(t._timer);
            t._timer = setTimeout(() => {
                t.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none');
                t.classList.remove('opacity-100', 'translate-y-0');
            }, 2000);
        }

        window.addEventListener('scroll', () => {
            const btn = document.getElementById('scrollTop');
            if (!btn) return;
            if (window.scrollY > 400) {
                btn.classList.remove('opacity-0', 'pointer-events-none');
                btn.classList.add('opacity-100', 'pointer-events-auto');
            } else {
                btn.classList.add('opacity-0', 'pointer-events-none');
                btn.classList.remove('opacity-100', 'pointer-events-auto');
            }
        });
    </script>

    <footer class="text-center py-6 text-white/20 text-xs border-t border-white/5 mt-10">
        Сделано студией <a href="https://maxxmoto.github.io/vexio/" target="_blank" class="text-white/40 hover:text-white transition">Vexio</a>
    </footer>
</body>
</html>
